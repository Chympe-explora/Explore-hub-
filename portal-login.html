<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator Portal — Explore Hub</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app" style="padding-bottom:24px">

  <div class="auth-wrap">
    <img class="mark" src="icons/icon-192.png" alt="">
    <h2>Welcome Back 👋</h2>
    <p>Sign in to continue to your account</p>
  </div>

  <div class="field"><label>Email Address</label><input type="email" placeholder="Enter your email"></div>
  <div class="field"><label>Password</label><input type="password" placeholder="Enter your password"></div>

  <div style="display:flex;justify-content:space-between;padding:0 20px 20px;font-size:12px;color:var(--text-dim)">
    <label style="display:flex;gap:6px;align-items:center"><input type="checkbox"> Remember me</label>
    <a style="color:var(--green);font-weight:600">Forgot Password?</a>
  </div>

  <div style="padding:0 20px">
    <button class="btn btn-primary" onclick="location.href='portal-dashboard.html'">Sign In</button>
  </div>

  <div class="divider">or continue with</div>
  <div class="social-row">
    <div class="social-btn">Google</div>
    <div class="social-btn">Facebook</div>
  </div>

  <div class="foot-link">Don't have an account? <a href="portal-signup.html">Sign Up</a></div>
  <div class="foot-link" style="margin-top:-10px"><a href="index.html">← Back to Explore Hub</a></div>
</div>
</body>
</html>
