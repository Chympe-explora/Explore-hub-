<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activities — Operator Portal</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="back-row">
    <a class="icon-btn" href="portal-dashboard.html">←</a>
    <h1>Activities</h1>
    <a class="icon-btn" href="portal-activity-edit.html" style="background:var(--green);color:#06210f;border:none;font-weight:700;width:auto;padding:0 14px;font-size:11px">+ Add New</a>
  </div>

  <div id="pa-list" style="padding-top:8px"></div>

  <div style="height:20px"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
renderPortalNav("activities");

(async () => {
  await loadActivities();
  document.getElementById("pa-list").innerHTML = ACTIVITIES.map((a,i)=>`
    <div class="list-row" onclick="location.href='portal-activity-edit.html?id=${a.id}'" style="cursor:pointer">
      <img src="${a.img}" alt="">
      <div class="body"><h4>${a.name}</h4><p>${money(a.price)} / person</p></div>
      <div class="toggle on" onclick="event.stopPropagation();this.classList.toggle('on')"></div>
    </div>
  `).join("");
})();
</script>
</body>
</html>
