<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Operators — Explore Hub</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="back-row">
    <a class="icon-btn" href="index.html">←</a>
    <h1>All Operators</h1>
    <a class="icon-btn" href="#">🔍</a>
  </div>

  <div class="filter-row">
    <button class="filter-chip active">All Activities</button>
    <button class="filter-chip">Sort ▾</button>
    <button class="filter-chip">Filters ⚙</button>
  </div>

  <div id="op-list"></div>

  <div style="height:20px"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
renderBottomNav("explore");

(async () => {
  document.getElementById("op-list").innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-faint);font-size:12.5px">Loading operators…</div>`;
  await loadOperators();
  document.getElementById("op-list").innerHTML = OPERATORS.map(op => `
    <div class="op-card">
      <div class="head">
        <div class="logo">${op.id==='chympe' ? '<img src="icons/icon-192.png" style="width:100%;height:100%;object-fit:cover">' : op.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
        <div>
          <div class="name-row"><h4>${op.name}</h4></div>
          <div class="verified">✔ Verified</div>
        </div>
      </div>
      <div class="meta" style="margin-top:8px">★ ${op.rating} (${op.reviews}) · ${op.years}</div>
      <div class="tags">${op.tags}</div>
      <a class="btn btn-primary" href="operator-profile.html?id=${op.id}">View Profile</a>
    </div>
  `).join("");
})();
</script>
</body>
</html>
