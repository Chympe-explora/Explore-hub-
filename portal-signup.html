<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Operator Account — Explore Hub</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app" style="padding-bottom:24px">
  <div class="back-row">
    <a class="icon-btn" href="portal-login.html">←</a>
    <h1>Create Operator Account</h1>
    <span></span>
  </div>
  <p style="padding:0 20px;color:var(--text-dim);font-size:12.5px;margin:2px 0 0">Join Explore Hub and grow your business</p>

  <div class="progress-steps">
    <div class="pstep done">1</div><div class="pline done"></div>
    <div class="pstep">2</div><div class="pline"></div>
    <div class="pstep">3</div>
  </div>
  <div style="display:flex;justify-content:center;gap:34px;margin-top:-18px;padding-bottom:10px;font-size:10px;color:var(--text-faint)">
    <span>Business Info</span><span>Documents</span><span>Review</span>
  </div>

  <div class="upload-box">🖼️<span>Upload Logo</span></div>

  <div class="field"><label>Business Name</label><input placeholder="Enter business name" value="Team Chympe Exploration"></div>
  <div class="field"><label>Your Name</label><input placeholder="Enter your full name"></div>
  <div class="field"><label>Email Address</label><input type="email" placeholder="Enter your email"></div>
  <div class="field"><label>Phone Number</label><input placeholder="Enter phone number"></div>

  <div style="padding:0 20px">
    <button class="btn btn-primary" onclick="location.href='portal-dashboard.html'">Next: Documents</button>
  </div>

  <div class="foot-link">Already have an account? <a href="portal-login.html">Sign In</a></div>
</div>
</body>
</html>
